name: Deploy theme to Beget

on:
  push:
    branches: [main]
    paths:
      - "public_html/wp-content/themes/nklv-dsgn/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: 22
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: "./public_html/wp-content/themes/nklv-dsgn/*"
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}
          sftp_only: true
